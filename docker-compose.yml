version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_secret
      POSTGRES_DB: helpdesk_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U helpdesk -d helpdesk_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
